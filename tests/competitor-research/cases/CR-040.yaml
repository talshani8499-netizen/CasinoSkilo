id: CR-040
category: edge-case
title: "Memory-differs handling — runtime competitors differ from cache; skill emits 3-option AskUserQuestion"
references:
  - skill: competitor-research
  - skill_md_lines: [255, 263]
preconditions:
  user_input: "compare BetMGM and DraftKings signup flows to ours"
  jira_context: null
  confluence_context: null
  active_memory: |
    # 21com
    **Competitors:** Stake (https://stake.com), 1Xbet (https://1xbet.com), Rollbit (https://rollbit.com), Bc.Game (https://bc.game)
  mcp_state: none
pass_criteria:
  - id: cr-memory-differs-confirms-inline
  - id: cr-memory-differs-three-option-question
    expected_header: "Competitors?"
    expected_options:
      - "Use cached"
      - "Use runtime + update memory"
      - "Use runtime, keep memory"
notes: |
  v1.2.0 split — was previously bundled in old CR-040 (4 sub-rules: DIFFERS / EMPTY / Playwright-off / robots.txt).
  This case now isolates ONLY the memory-differs sub-rule (SKILL.md lines 255–263).

  Runtime input names BetMGM + DraftKings, but memory caches Stake/1Xbet/Rollbit/Bc.Game.
  The skill MUST:
    1. Detect the divergence and NOT silently overwrite memory.
    2. Present a single AskUserQuestion with header `Competitors?` and the exact 3 spec'd options:
       - `Use cached` — Use the cached competitors and ignore runtime input
       - `Use runtime + update memory` — Use runtime and overwrite memory cache
       - `Use runtime, keep memory` — Use runtime just for this run; leave memory untouched

  Original bundled sub-rules now live in dedicated cases:
    - sub-rule 2 (EMPTY → cache after Phase B)        → CR-047
    - sub-rule 3 (Playwright off → degrade gracefully) → CR-048
    - sub-rule 4 (HTTP 403/451/robots-style block)     → CR-045
