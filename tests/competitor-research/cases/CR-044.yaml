id: CR-044
category: handoff
title: "Confluence-attachment offer — after Bet on it with N≥1 screenshots, skill presents 'Attach screenshots?' AskUserQuestion"
references:
  - skill: competitor-research
  - skill_md_lines: [242, 250]
preconditions:
  user_input: "deep UX flow of Stake and Bc.Game signup with screenshots"
  jira_context: null
  confluence_context: null
  active_memory: |
    # 21com
    **Competitors:** Stake (https://stake.com), 1Xbet (https://1xbet.com), Rollbit (https://rollbit.com), Bc.Game (https://bc.game)
  mcp_state: atlassian+playwright
  prior_artifacts: |
    Simulated Playwright run produced 3 screenshots in
    ~/Downloads/competitor-research/signup-flow/screenshots/:
      - stake-home.png
      - stake-signup.png
      - bcgame-signup.png
    Handoff: user picked "Bet on it" → Confluence page successfully created in PKB.
pass_criteria:
  - id: gamble-handoff-presented-once
  - id: gamble-options-match-spec
    skill: competitor-research
    expected_options: ["Bet on it", "Hold the chip"]
  - id: cr-confluence-screenshots-note
    expected_message_substring: "Screenshots are local-only"
  - id: cr-confluence-attachment-offer-fires
    expected_header: "Attach screenshots?"
    expected_question_substring: "Upload 3 screenshots to the Confluence page as attachments"
    expected_options:
      - "Upload all"
      - "Upload none"
    fires_after: "Bet on it + Confluence page created + N >= 1 screenshots"
notes: |
  v1.2.0 bonus question (SKILL.md lines 242–250). Fires ONLY when:
    1. User picked "Bet on it"
    2. Confluence page was successfully created
    3. N >= 1 screenshots exist in the screenshots/ subdir

  Sequence to verify:
    a. The "Ready To Gamble On It?" question fires once.
    b. After Confluence publish, the one-line "Screenshots are local-only..." note appears.
    c. THEN the bonus "Attach screenshots?" AskUserQuestion fires with header "Attach screenshots?"
       and exactly 2 options: "Upload all" / "Upload none".

  Note: this chains 2 AskUserQuestions in the handoff. The 7-question cap (line 61) covers
  Phase B + Phase C interview questions, not handoff confirmations — but if any Phase C
  questions fired earlier this case still stays within budget because handoff questions are
  scoped separately from the interview cap.
