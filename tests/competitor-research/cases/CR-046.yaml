id: CR-046
category: phase-b-core-questions
title: "Phase B fallback path — memory empty AND user didn't name competitors → Phase B asks; fallback options shown"
references:
  - skill: competitor-research
  - skill_md_lines: [86, 95]
preconditions:
  user_input: "I need a competitor scan on signup flow"
  jira_context: null
  confluence_context: null
  active_memory: null
  mcp_state: none
pass_criteria:
  - id: phase-a-does-not-infer-field
    field: "Competitors"
  - id: phase-b-asks
    questions: ["Competitors"]
  - id: phase-b-question-shape
    question: "Competitors"
    expected_header: "Targets"
    expected_options_count: 3
  - id: phase-b-options-match-spec
    question: "Competitors"
    expected_options:
      - "Memory default"
      - "Memory + best-in-class"
      - "Custom list"
notes: |
  Negative-control sibling to CR-041. Conditions for the FALLBACK path (SKILL.md lines 86–95):
    - active_memory is null (no **Competitors:** line)
    - user_input does NOT name any specific competitor
  → Phase A cannot infer Competitors → Phase B MUST ask the Competitors question.

  The 3 spec'd options:
    - "Memory default" (with the memory-substitution label when memory exists; here memory is
      empty, so this option degrades to its fallback label)
    - "Memory + best-in-class"
    - "Custom list"

  Pair-read with CR-041 (canonical memory-reuse path) — together they verify the spec's
  bifurcation: memory present → Phase A infers + Phase B skips; memory absent → Phase B asks.
