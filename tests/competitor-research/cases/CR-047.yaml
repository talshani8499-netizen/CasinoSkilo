id: CR-047
category: edge-case
title: "Memory cached after Phase B — empty memory → Phase B asks Competitors → answer appended as **Competitors:** line"
references:
  - skill: competitor-research
  - skill_md_lines: [211, 256]
preconditions:
  user_input: "scan competitor signup flows — I'll provide the list"
  jira_context: null
  confluence_context: null
  active_memory: null
  mcp_state: none
  prior_artifacts: |
    Phase B "Competitors" question fires with the 3 spec'd options.
    PM picks "Custom list" and provides at runtime:
      - BetMGM      — https://betmgm.com
      - DraftKings  — https://draftkings.com
      - FanDuel     — https://fanduel.com
    Active product slug resolved as `21com` (from working directory).
pass_criteria:
  - id: phase-a-does-not-infer-field
    field: "Competitors"
  - id: phase-b-asks
    questions: ["Competitors"]
  - id: cr-memory-empty-caches-after-phase-b
    expected_file_path: "~/.claude/memory/21com.md"
    expected_line_pattern: "**Competitors:**"
    expected_names_any_of: ["BetMGM", "DraftKings", "FanDuel"]
    expected_urls_any_of:
      - "https://betmgm.com"
      - "https://draftkings.com"
      - "https://fanduel.com"
notes: |
  Split from old bundled CR-040 sub-rule 2 (SKILL.md lines 211 + 255–256):
    "If memory has no competitor list yet, ask via Phase B then cache the answer back to
     memory before producing the report."
    "When the PM provides a competitor list at runtime (because memory had none, or chose
     Custom list in Phase B), append it to ~/.claude/memory/<project-slug>.md so the next
     invocation reuses it without asking. Create the ~/.claude/memory/ directory and the
     file if they do not exist. Format: a **Competitors:** line listing names + URLs."

  Verify the write happens BEFORE the report is rendered, and the line uses the exact
  `**Competitors:**` marker (so CR-041 / Phase A inference can read it on the next run).
