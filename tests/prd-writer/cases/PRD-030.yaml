id: PRD-030
category: output-structure
title: "Inferred (not asked) block at top when Phase A inferred ≥1 field"
references:
  - skill: prd-writer
  - skill_md_lines: [53, 60]
preconditions:
  user_input: "We're working on v2 of raffles for high rollers — need a PRD"
  jira_context: |
    PR-310 / closed / "Raffles v1" / epic / component: promotions
  confluence_context: null
  active_memory: null
  mcp_state: atlassian
pass_criteria:
  - id: inferred-block-present
    must: true
  - id: inferred-includes-field
    field: "Maturity"
    expected_value: "Existing feature"
    must_cite_phrase: "v2 of raffles"
  - id: inferred-includes-field
    field: "Main user"
    expected_value: "VIP player"
    must_cite_phrase: "high rollers"
notes: "When Phase A inferred at least one field, the Inferred block must appear at the top of the PRD before §1."
