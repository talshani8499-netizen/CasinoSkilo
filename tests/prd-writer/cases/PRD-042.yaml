id: PRD-042
category: phase-a-inference
title: "Main user surfaces `vip` sub-tag in User Story when input names VIP players"
references:
  - skill: prd-writer
  - skill_md_lines: [56, 56]
preconditions:
  user_input: "Build a VIP-only progress bar to the next loyalty tier on the casino lobby"
  jira_context: |
    PR-470 / closed / "Casino home redesign" / component: home
    PR-481 / open / "Smartico loyalty event wiring" / component: integrations
  confluence_context: null
  active_memory: null
  mcp_state: atlassian
pass_criteria:
  - id: phase-a-infers-field
    field: "Main user"
    expected_value: "End user"
    must_cite_phrase: "VIP"
  - id: inferred-block-present
    must: true
  - id: inferred-includes-field
    field: "Main user"
    expected_value: "End user"
    must_cite_phrase: "VIP"
  - id: phase-a-sub-segment-tag-applied
    tag: "vip"
    expected_user_story_substring: "As a VIP player"
  - id: phase-b-skips
    questions: ["Main user"]
notes: "v1.1.0 sub-segment hints (L56): VIP / high-roller / whale signals → Main user inferred as End user WITH a `vip` tag surfaced verbatim in the User Story line (e.g. 'As a VIP player (vip-tier ≥ 2), I want…'). The tag must appear in the rendered §6 User Story, not just the Inferred block."
