  jira_context: |
    PR-712 / open / "FTD retention experiments" / squad: crm
    PR-805 / open / "Smartico campaign console UX" / component: admin-panel
  confluence_context: null
  active_memory: null
  mcp_state: atlassian
pass_criteria:
