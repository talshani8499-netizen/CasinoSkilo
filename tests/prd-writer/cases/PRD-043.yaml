notes: "v1.1.0 sub-segment hints (L56): CRM operator / campaign manager / lifecycle signals → Main user inferred as Admin / internal WITH a `crm` tag surfaced in the User Story (e.g. 'As a CRM operator, I want…'). The tag must appear verbatim in the rendered §6 User Story line."
