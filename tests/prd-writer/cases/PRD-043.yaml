    expected_value: "Admin / internal"
    must_cite_phrase: "CRM operator"
  - id: inferred-block-present
    must: true
  - id: inferred-includes-field
    field: "Main user"
    expected_value: "Admin / internal"
    must_cite_phrase: "CRM operator"
  - id: phase-a-sub-segment-tag-applied
