id: TB-011
category: phase-a-inference
title: "Conflicting signals 'fix the new feature' resolve cleanly or fall through"
references:
  - skill: ticket-builder
  - skill_md_lines: [56, 64]
preconditions:
  user_input: "fix the new VIP cashback feature — it's not crediting on time"
  jira_context: |
    PR-602 / open / "VIP cashback v2" / component: vip / status: in QA
  confluence_context: null
  active_memory: null
  mcp_state: none
pass_criteria:
  - id: phase-a-resolves-conflict
    field: "Ticket type"
    acceptable_outcomes: ["Bug", "<not inferred>"]
  - id: phase-a-infers-field
    field: "Connection"
    expected_value: "Extends"
    must_cite_phrase: "VIP cashback"
notes: "Both 'fix' (Bug) and 'new feature' signals appear. The skill must either resolve to Bug (current breakage on an existing feature) or leave Ticket type uninferred — both outcomes are acceptable since the signals genuinely conflict. Connection still infers Extends from the named existing feature."
