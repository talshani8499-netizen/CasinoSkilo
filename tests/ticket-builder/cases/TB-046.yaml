    expected_pattern: '> \*\*Assumption:\*\* .+ \*\*Flag:\*\* .+'
notes: "Line 104: when Phase C cannot write 3 concrete options for an unknown (e.g. animation library — no signal in context), it must NOT invent placeholders and must NOT ask. Instead it converts to an inline blockquote line matching the EXACT spec format: '> **Assumption:** <statement>. **Flag:** <one-line reason>.' placed inside the relevant Description or DoD bullet."
